<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Tel Aviv Artsy Cinema Guide</title>
    <!-- Favicon: Cinema Camera SVG -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23F43F5E'><path d='M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z'/></svg>">
    <!-- Tailwind CSS for modern utility styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Client library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cinema: {
                            bg: '#0F121D',
                            card: '#181C2B',
                            accent: '#F43F5E', // Rose-500
                            gold: '#F59E0B',   // Amber-500
                            textMuted: '#9CA3AF'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0F121D;
            color: #F3F4F6;
        }
        .serif-title {
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>
<body class="min-h-screen py-12 px-4 md:px-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12">
            <span class="text-xs uppercase tracking-widest text-cinema-accent font-semibold">Live Schedule</span>
            <h1 class="serif-title text-4xl md:text-5xl font-bold mt-2 mb-4 tracking-tight">Tel Aviv Cinema Guide</h1>
            <p class="text-cinema-textMuted max-w-md mx-auto text-sm md:text-base">
                Curated screenings from independent theaters across Tel Aviv, updated live.
            </p>
        </header>

        <!-- Loading State -->
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-cinema-accent mb-4"></div>
            <p class="text-sm text-cinema-textMuted">Loading screenings from database...</p>
        </div>

        <!-- Error State -->
        <div id="error-message" class="hidden bg-red-900/30 border border-red-500/50 rounded-xl p-4 mb-8 text-center text-red-200 text-sm">
            Failed to fetch screenings. Please check your Supabase connection and table.
        </div>

        <!-- Movie List Container -->
        <div id="movies-container" class="hidden space-y-6">
            <!-- Screenings list will be dynamically rendered here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-20">
            <p class="text-cinema-textMuted text-lg">No upcoming screenings found.</p>
        </div>
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = "https://ogeuskulwtypdslyohcs.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_wRaOnBmGfL6K7F30tCmCJw_WH9NtnRe";

        // Initialize Supabase Client
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function formatDate(dateStr) {
            try {
                const options = { weekday: 'short', month: 'short', day: 'numeric' };
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', options);
            } catch (e) {
                return dateStr;
            }
        }

        async function fetchAndRenderScreenings() {
            const loadingEl = document.getElementById('loading');
            const containerEl = document.getElementById('movies-container');
            const errorEl = document.getElementById('error-message');
            const emptyEl = document.getElementById('empty-state');

            try {
                // Fetch screenings ordered by earliest date and time
                const { data: screenings, error } = await supabaseClient
                    .from('screenings')
                    .select('*')
                    .order('date', { ascending: true })
                    .order('time', { ascending: true });

                if (error) throw error;

                loadingEl.classList.add('hidden');

                if (!screenings || screenings.length === 0) {
                    emptyEl.classList.remove('hidden');
                    return;
                }

                // Group screenings by title + cinema (excluding past screenings in Tel Aviv time)
                // Group screenings by title + cinema (excluding past screenings in Tel Aviv time)
                const groups = {};
                
                // Get current date/time in Tel Aviv timezone
                const telAvivTimeString = new Date().toLocaleString("en-US", {timeZone: "Asia/Jerusalem"});
                const nowTelAviv = new Date(telAvivTimeString);

                screenings.forEach(screening => {
                    const screeningTime = new Date(`${screening.date}T${screening.time}`);
                    if (screeningTime < nowTelAviv) {
                        return; // Skip screenings in the past
                    }
                    
                    const key = `${screening.title}|||${screening.cinema}`;
                    if (!groups[key]) {
                        groups[key] = {
                            title: screening.title,
                            cinema: screening.cinema,
                            year: screening.year,
                            imdb_url: screening.imdb_url,
                            imdb_score: screening.imdb_score,
                            rt_score: screening.rt_score,
                            poster_url: screening.poster_url,
                            plot: screening.plot,
                            showtimes: []
                        };
                    }
                    // Deduplicate showtimes by date and time
                    const exists = groups[key].showtimes.some(st => st.date === screening.date && st.time === screening.time);
                    if (!exists) {
                        groups[key].showtimes.push({
                            date: screening.date,
                            time: screening.time,
                            ticket_url: screening.ticket_url
                        });
                    }
                });

                // Sort groups by the date/time of their earliest upcoming showtime
                const sortedGroups = Object.values(groups).sort((a, b) => {
                    const dateA = new Date(`${a.showtimes[0].date}T${a.showtimes[0].time}`);
                    const dateB = new Date(`${b.showtimes[0].date}T${b.showtimes[0].time}`);
                    return dateA - dateB;
                });

                if (sortedGroups.length === 0) {
                    emptyEl.classList.remove('hidden');
                    return;
                }
                emptyEl.classList.add('hidden');

                // Render screenings
                containerEl.innerHTML = '';
                sortedGroups.forEach(group => {
                    const card = document.createElement('div');
                    card.className = "bg-cinema-card border border-gray-800/40 rounded-2xl p-5 md:p-6 transition-all duration-300 hover:border-cinema-accent/30 hover:shadow-lg hover:shadow-cinema-accent/5 flex flex-col sm:flex-row items-start gap-5";

                    // 1. Poster
                    const posterContainer = document.createElement('div');
                    posterContainer.className = "w-32 h-48 sm:w-36 sm:h-52 flex-shrink-0 bg-gray-900 border border-gray-800 rounded-xl overflow-hidden shadow-inner flex items-center justify-center";
                    if (group.poster_url) {
                        const img = document.createElement('img');
                        img.src = group.poster_url;
                        img.className = "w-full h-full object-cover";
                        img.alt = group.title;
                        posterContainer.appendChild(img);
                    } else {
                        posterContainer.innerHTML = `
                            <svg class="w-8 h-8 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a2 2 0 002-2V6a2 2 0 00-2-2H4a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        `;
                    }
                    card.appendChild(posterContainer);

                    // 2. Info Section
                    const infoSection = document.createElement('div');
                    infoSection.className = "flex-1 min-w-0";

                    // Title & Year
                    const titleHeader = document.createElement('div');
                    titleHeader.className = "flex items-baseline gap-2 flex-wrap mb-1.5";
                    
                    const titleSpan = document.createElement('h2');
                    titleSpan.className = "text-xl font-bold text-gray-100 tracking-tight";
                    titleSpan.textContent = group.title;
                    titleHeader.appendChild(titleSpan);

                    if (group.year) {
                        const yearSpan = document.createElement('span');
                        yearSpan.className = "text-xs font-semibold text-cinema-gold px-2 py-0.5 rounded bg-cinema-gold/10";
                        yearSpan.textContent = group.year;
                        titleHeader.appendChild(yearSpan);
                    }
                    infoSection.appendChild(titleHeader);

                    // Scores and links (IMDb / RT)
                    const scoresDiv = document.createElement('div');
                    scoresDiv.className = "flex items-center gap-3 mt-2 mb-3 text-xs";

                    // IMDb badge & link
                    if (group.imdb_url) {
                        const imdbLink = document.createElement('a');
                        imdbLink.href = group.imdb_url;
                        imdbLink.target = "_blank";
                        imdbLink.className = "flex items-center gap-1.5 bg-yellow-500/10 hover:bg-yellow-500/20 text-yellow-500 px-2 py-1 rounded border border-yellow-500/20 transition-colors";
                        const scoreText = (group.imdb_score && group.imdb_score !== 'N/A') ? group.imdb_score : 'Link';
                        imdbLink.innerHTML = `
                            <span class="font-black bg-yellow-500 text-black px-1 rounded-sm text-[10px]">IMDb</span>
                            <span class="font-bold">${scoreText}</span>
                        `;
                        scoresDiv.appendChild(imdbLink);
                    }

                    // Rotten Tomatoes badge
                    if (group.rt_score && group.rt_score !== 'N/A') {
                        const rtLink = document.createElement('a');
                        rtLink.href = `https://www.rottentomatoes.com/search?search=${encodeURIComponent(group.title)}`;
                        rtLink.target = "_blank";
                        rtLink.className = "flex items-center gap-1.5 bg-red-500/10 hover:bg-red-500/20 text-red-500 px-2 py-1 rounded border border-red-500/20 transition-colors";
                        rtLink.innerHTML = `
                            <span class="text-[12px]">🍅</span>
                            <span class="font-bold">${group.rt_score}</span>
                        `;
                        scoresDiv.appendChild(rtLink);
                    }
                    infoSection.appendChild(scoresDiv);

                    // Plot Summary
                    if (group.plot) {
                        const plotP = document.createElement('p');
                        plotP.className = "text-sm text-cinema-textMuted/90 line-clamp-2 mt-2 leading-relaxed max-w-xl";
                        plotP.textContent = group.plot;
                        infoSection.appendChild(plotP);
                    }

                    // Meta Info (Cinema & Showtimes Select)
                    const metaDiv = document.createElement('div');
                    metaDiv.className = "flex flex-wrap items-center gap-x-4 gap-y-3 text-sm text-cinema-textMuted mt-4";

                    // Theater/Cinema badge
                    if (group.cinema) {
                        const cinemaSpan = document.createElement('span');
                        cinemaSpan.className = "flex items-center gap-1.5 text-gray-300 font-medium";
                        cinemaSpan.innerHTML = `
                            <svg class="w-4 h-4 text-cinema-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            ${group.cinema}
                        `;
                        metaDiv.appendChild(cinemaSpan);
                    }

                    // Showtimes Selector or Static Text
                    const selectContainer = document.createElement('div');
                    selectContainer.className = "flex items-center gap-2 pl-4 border-l border-gray-700/60";
                    
                    const selectLabel = document.createElement('label');
                    selectLabel.className = "text-xs font-semibold text-cinema-textMuted uppercase tracking-wider";
                    selectLabel.textContent = "Showtime:";
                    selectContainer.appendChild(selectLabel);

                    let selectEl;
                    if (group.showtimes.length > 1) {
                        selectEl = document.createElement('select');
                        selectEl.className = "bg-cinema-bg border border-gray-700 text-gray-200 rounded-lg px-2 py-1 text-sm font-medium focus:outline-none focus:border-cinema-accent/60 cursor-pointer";
                        
                        group.showtimes.forEach((st, idx) => {
                            const opt = document.createElement('option');
                            opt.value = idx;
                            opt.textContent = `${formatDate(st.date)} @ ${st.time}`;
                            selectEl.appendChild(opt);
                        });
                        selectContainer.appendChild(selectEl);
                    } else {
                        const st = group.showtimes[0];
                        const textSpan = document.createElement('span');
                        textSpan.className = "text-gray-200 text-sm font-medium";
                        textSpan.textContent = `${formatDate(st.date)} @ ${st.time}`;
                        selectContainer.appendChild(textSpan);
                    }
                    metaDiv.appendChild(selectContainer);

                    infoSection.appendChild(metaDiv);
                    card.appendChild(infoSection);

                    // 3. Action Button (Tickets/Details)
                    const actionDiv = document.createElement('div');
                    actionDiv.className = "flex sm:flex-col justify-end w-full sm:w-auto self-stretch sm:self-center";
                    
                    const ticketBtn = document.createElement('a');
                    ticketBtn.target = "_blank";
                    ticketBtn.className = "w-full sm:w-auto text-center bg-cinema-accent hover:bg-rose-600 text-white font-semibold text-sm px-6 py-3 rounded-xl transition-colors duration-200 shadow-md shadow-cinema-accent/10 whitespace-nowrap cursor-pointer";
                    ticketBtn.textContent = "Details";

                    // Set initial ticket link and listener to update on selection change
                    const updateTicketLink = () => {
                        const selectedShowtime = selectEl 
                            ? group.showtimes[selectEl.value] 
                            : group.showtimes[0];
                        if (selectedShowtime && selectedShowtime.ticket_url) {
                            ticketBtn.href = selectedShowtime.ticket_url;
                            ticketBtn.classList.remove('opacity-50', 'pointer-events-none');
                        } else {
                            ticketBtn.removeAttribute('href');
                            ticketBtn.classList.add('opacity-50', 'pointer-events-none');
                        }
                    };
                    
                    if (selectEl) {
                        selectEl.addEventListener('change', updateTicketLink);
                    }
                    updateTicketLink(); // Initial run

                    actionDiv.appendChild(ticketBtn);
                    card.appendChild(actionDiv);

                    containerEl.appendChild(card);
                });

                containerEl.classList.remove('hidden');

            } catch (err) {
                console.error("Supabase fetch error:", err);
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
            }
        }

        // Run on page load
        window.addEventListener('DOMContentLoaded', fetchAndRenderScreenings);
    </script>
</body>
</html>
